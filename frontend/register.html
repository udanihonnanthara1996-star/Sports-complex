<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - SportBook</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar"><div class="nav-brand"><a href="index.html">🏟️ SportBook</a></div></nav>
  <main class="auth-page">
    <div class="auth-card">
      <h2>Create Account</h2>
      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="phone">Phone (with country code)</label>
          <input type="tel" id="phone" required placeholder="+1234567890">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="6" placeholder="Min 6 characters">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Register</button>
        <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
      </form>
      <div id="errorMsg" class="error-msg"></div>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
