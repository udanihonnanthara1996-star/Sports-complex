<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Facility - SportBook</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/booking.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-brand"><a href="index.html">🏟️ SportBook</a></div>
    <div class="nav-links" id="navLinks"></div>
  </nav>
  <main class="booking-page">
    <h1>Book a Facility</h1>
    <form id="bookingForm" class="booking-form">
      <div class="form-group">
        <label for="facility">Select Facility</label>
        <select id="facility" required></select>
      </div>
      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" required>
      </div>
      <div class="form-group">
        <label for="timeSlot">Time Slot</label>
        <select id="timeSlot" required></select>
      </div>
      <div class="form-group">
        <label for="duration">Duration (hours)</label>
        <select id="duration">
          <option value="1">1 Hour</option>
          <option value="2">2 Hours</option>
          <option value="3">3 Hours</option>
        </select>
      </div>
      <div class="form-group">
        <label for="notes">Notes (optional)</label>
        <textarea id="notes" rows="3" placeholder="Any special requests..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Confirm Booking</button>
    </form>
    <div id="bookingMsg" class="msg"></div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/booking.js"></script>
</body>
</html>
