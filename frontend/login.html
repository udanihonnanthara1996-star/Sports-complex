<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SportBook</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar"><div class="nav-brand"><a href="index.html">🏟️ SportBook</a></div></nav>
  <main class="auth-page">
    <div class="auth-card">
      <h2>Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Your password">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Login</button>
        <p class="auth-link">Don't have an account? <a href="register.html">Register</a></p>
      </form>
      <div id="errorMsg" class="error-msg"></div>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
